name: 🐛 Bug report
description: Report something that isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! For **security vulnerabilities**, please do not use this form — [report privately](https://github.com/mvsssharma/glintpost/security/advisories/new) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I ..., I expected ..., but instead ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment mode
      options:
        - Self-hosted (Docker)
        - Self-hosted (Node / manual)
        - Cloud (glintpost.com)
        - Local development
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Git commit SHA or release tag you're running.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Node version, storage driver (local/s3), external DB — whatever is relevant.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Server logs (`docker compose logs web`) or browser console output. **Redact any secrets.**
      render: shell
    validations:
      required: false
