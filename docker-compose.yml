services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://glintpost:password@db:5432/glintpost
      - DIRECT_DATABASE_URL=postgresql://glintpost:password@db:5432/glintpost
      - ENABLE_BILLING=false
      - REQUIRE_EMAIL_VERIFICATION=false
      - APP_URL=http://localhost:3000
      # Image uploads are stored on a local volume — no S3/Cloudflare account needed.
      # To use an external object store instead, set STORAGE_DRIVER=s3 and the S3_* vars.
      - STORAGE_DRIVER=local
      - UPLOAD_DIR=/app/data/uploads
      # Quickstart secret — generate your own for anything real: openssl rand -base64 32
      - AUTH_SECRET=dev-secret-change-in-production-abc123
      - AUTH_URL=http://localhost:3000
    volumes:
      - uploads_data:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: glintpost
      POSTGRES_PASSWORD: password
      POSTGRES_DB: glintpost
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glintpost -d glintpost"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  uploads_data:
